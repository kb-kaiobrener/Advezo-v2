security_constraints:
  - "phone_hash: HMAC-SHA256(normalizePhone(phone), workspace_salt) — nunca SHA256 simples"
  - "email_encrypted: AES-256-GCM — reversível, nunca SHA256"
  - "SHA256(email) para CAPI user_data.em: calculado em memória, nunca persistido"
  - "embed_token: crypto.randomBytes(16).toString('base64url') — 128 bits"
  - "X-Hub-Signature-256: timingSafeEqual obrigatório"
  - "consent_given_at gate: LP → somente se NOT NULL; Lead Ads → sempre (base Meta)"
  - "SUPABASE_SERVICE_ROLE_KEY nunca em NEXT_PUBLIC_*"
  - "3 UNIQUE INDEX como constraints de banco, não só validação em código"

