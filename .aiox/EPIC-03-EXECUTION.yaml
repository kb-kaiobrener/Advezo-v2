epic_id: "03"
epic_name: "Comunicação com Cliente via WhatsApp"
epic_path: "docs/stories/epics/epic-03-comunicacao-whatsapp"
prd_section: "docs/prd.md § Epic 3 (linha ~510)"
authorized_by: "@pm (Morgan)"
authorized_at: "2026-06-30"

goal: >
  Eliminar o trabalho manual do gestor na comunicação com clientes — relatórios automáticos
  via WhatsApp adaptados ao objetivo real da conta, alertas proativos antes do saldo zerar,
  e dashboard compartilhável com branding da agência que substitui planilha.
  Base técnica: serviço WhatsApp estável via Baileys, migrado na Story 3.1 antes de
  qualquer outra story deste epic.

blocking_constraint:
  development: >
    Wave 2+ desbloqueadas após QA Gate PASS (código) + confirmação manual das 24h de
    estabilidade em staging (AC 3.1.4): ciclo QR → conexão → sessão no Supabase Storage →
    reconexão após restart. Número WA de teste (qualquer número disponível) suficiente.
  production: >
    Uso com número de cliente real bloqueado até `pre_production_gate` ser satisfeito —
    7 dias de uptime contínuo monitorado via UptimeRobot (Monitor 2 — /health do worker),
    sem restart manual, sem queda de sessão, sem alerta de memória > 70%.
    Este gate NÃO bloqueia o desenvolvimento das stories restantes do Epic 3.

architectural_decisions_locked:
  - "whatsapp-worker: Railway Nixpacks sem Dockerfile (apps/whatsapp-worker/)"
  - "Sessão Baileys: Supabase Storage — {workspace_id}/wpp/{account_id}/session.json"
  - "Circuit breaker: 5 falhas de reconexão em 10 min → cb_paused_at em whatsapp_accounts"
  - "whatsapp_accounts.cb_failure_count (integer) + cb_paused_at (timestamptz)"
  - "Número WhatsApp de teste dedicado para dev/staging — nunca número real de cliente"
  - "Library: @whiskeysockets/baileys (última versão estável)"
  - "Logging: pino (JSON estruturado)"
  - "HTTP server: Express (health check GET /health, QR endpoint GET /qr)"
  - "Supabase client no worker: service role key via env var (sem JWT de usuário)"
  - "Migration 000010: whatsapp_accounts (Story 3.1); 000011: whatsapp_connections (Story 3.2)"

execution_plan:

  wave_1:
    stories: ["3.1"]
    description: "Fundação — Migração whatsapp-worker para Baileys"
    mode: "interactive"
    qa_gate: "completo"
    gate_before_advance: true
    parallel: false
    notes: >
      Pré-requisito bloqueante de todo o Epic 3 e dos Epics 4, 5, 6.
      Story 3.1 toca em infra de processo de longa duração no Railway, sessão persistida
      no Supabase Storage e circuit breaker crítico.
      CRITÉRIO ESPECIAL DE DONE: além do QA Gate de código (testes, typecheck, lint),
      a story só é Done após 24h de sessão conectada e estável em staging sem queda —
      sem Chromium, sem Puppeteer. Este critério NÃO pode ser dispensado ou substituído
      por mocks.
      Número WA: qualquer número disponível serve para escanear o QR em staging.
      account_id = número E.164 (ex: 5511999998888) — text sem CHECK constraint.
      JID Baileys (...@s.whatsapp.net) é detalhe interno, não persistido no banco.
      Migration: 000010 (000009 foi o Epic 8 após renomeação).
      tsconfig.json ausente — deve ser criado ANTES de qualquer outra coisa.
    status: "done"
    released_at: "2026-06-30"
    completed_code_at: "2026-06-30"
    completed_staging_at: "2026-07-03"
    qa_result: >
      PASS — 18/18 testes passando (10 session + 8 circuit-breaker), build limpo, typecheck limpo.
      Nenhuma dep de Chromium/Puppeteer. AC 3.1.4 confirmada 2026-07-03 (24h+ estabilidade produção,
      restart com reconexão automática). AC 3.1.5 confirmada 2026-07-02 (POST /send → {"ok":true}).
      Story 3.1 plenamente concluída — Wave 2 desbloqueada.
    qa_concerns:
      - "MNT-001: status='connecting' nunca setado no código (migration permite) — avaliar em Story 3.2"
      - "PERF-001: createSupabaseServiceClient() instanciado por chamada (não memoizado)"
      - "REL-001: contagem CB em memória zera no restart (cb_paused_at persistido mantém bloqueio)"
    notes_post: >
      Supply-chain: blockExoticSubdeps=false em pnpm-workspace.yaml (aprovado pelo usuário).
      Razão: pnpm 11 não tem allowlist granular; libsignal é dep git-only do Baileys.
      @architect deve reconciliar architecture.md (schema diverge da story — story é autoritativa).
      Nota de migração: 000011 foi ocupada por whatsapp_accounts_grants (fix de produção em 2026-07-02).
      Migration de whatsapp_connections (Story 3.2) usa número 000012.
    staging_confirmed:
      ac_3_1_4: "2026-07-03 — sessão estável 24h+ em produção; restart com reconexão automática sem novo QR."
      ac_3_1_5: "2026-07-02 — POST /send em produção retornou {\"ok\":true} em ~1s."

  wave_2:
    stories: ["3.2", "3.4"]
    description: "Conexão por cliente + Motor de geração de relatório"
    mode:
      "3.2": "interactive"
      "3.4": "yolo"
    qa_gate:
      "3.2": "completo"
      "3.4": "yolo"
    gate_before_advance: true
    parallel: true
    depends_on: ["wave_1"]
    notes: >
      3.2 (Conexão WA): QR code flow, multi-tenant Supabase Storage, status de conexão na UI.
      Requer worker rodando — modo interativo obrigatório.
      3.4 (Geração de relatório): lógica pura, testável unitariamente sem conexão WhatsApp.
      Pode rodar em paralelo com 3.2 (sem dependência entre si).
    status: "done"
    completed_code_at: "2026-07-04"
    qa_result: >
      3.2: CONCERNS→Done. Concerns não bloqueantes resolvidos antes do push final:
      REQ-001 (markConnected/markDisconnected agora sincronizam whatsapp_connections)
      e MNT-001 (revalidatePath adicionado nas server actions). 256 testes passando.
      3.4: PASS. 19 testes passando (3 cenários obrigatórios AC 3.4.5 + 16 adicionais).

  wave_3:
    stories: ["3.3", "3.7"]
    description: "Configuração de relatórios + Dashboard compartilhável"
    mode:
      "3.3": "yolo"
      "3.7": "yolo"
    qa_gate:
      "3.3": "yolo"
      "3.7": "yolo"
    gate_before_advance: true
    parallel: true
    depends_on: ["wave_2"]
    notes: >
      3.3 (Config relatórios): CRUD de report_schedules — padrão estabelecido.
      3.7 (Dashboard compartilhável): rota pública /dashboard/[token] com JWT de escopo
      restrito (NFR-2 — sem service key exposta). Atenção ao AC 3.7.8 (< 2s Lighthouse em 4G).
    status: "done"
    completed_code_at: "2026-07-06"
    qa_result: >
      3.3: PASS. 15/15 testes. 6/6 ACs. Validação server-side pré-auth confirmada.
      3.7: PASS. 11/11 testes. 7/7 ACs. Middleware gate (ISR + Edge WebCrypto HMAC).
      AC 3.7.8 pendente Lighthouse em produção Vercel.

  wave_4:
    stories: ["3.5", "3.6"]
    description: "Envio de relatório + Alertas proativos via WhatsApp"
    mode:
      "3.5": "interactive"
      "3.6": "interactive"
    qa_gate:
      "3.5": "completo"
      "3.6": "completo"
    gate_before_advance: true
    parallel: true
    depends_on: ["wave_3"]
    notes: >
      3.5 (Envio relatório): envio real via Baileys, suporte a grupo de WA (FR-B1),
      dedup de relatório no período, reenvio manual. Modo interativo — toca envio real.
      3.6 (Alertas proativos): consome tabela alerts da Story 2.9, envio via Baileys,
      suporte a grupo. Modo interativo — integração cross-epic + envio real.
      AC crítico 3.5.2: suporte explícito a grupo testado com envio real.
      AC crítico 3.6.5: sem envio duplicado.
    status: "done"
    completed_code_at: "2026-07-07"
    qa_result: >
      3.5: CONCERNS→Done. 27/27 testes, 9/9 ACs. GRANT-001 (ad_accounts/campaign_metrics
      sem grant service_role) resolvido pela migration 000017 durante o ciclo da 3.6.
      3.6: FAIL→fix→PASS. 12/12 testes, 10/10 ACs. 1ª rodada reprovou por BLOCK-001
      (coluna account_name) e BLOCK-002 (grants); re-teste com curl expôs QA-3
      (proxy.ts redirecionava /api/cron/* → /login — bug pré-existente que afetava
      também os crons do Epic 2/2.9, agora destravados). Verificação final na
      infraestrutura real: crons 401/401/200, gate de sessão intacto.
    qa_concerns:
      - "OBS-001 (low): auth do cron por comparação direta — alinhar com guard fail-closed do Epic 2 em manutenção"
      - "TD-004 (HIGH se lead form em uso): /api/leads/submit ainda 307 → /login — dono Story 8.3"
      - "Envio real WhatsApp (grupo e individual) pendente de validação pós-deploy com conta conectada"

  wave_5:
    stories: ["3.8"]
    description: "Painel logado do cliente final"
    mode: "yolo"
    qa_gate: "yolo"
    gate_before_advance: false
    parallel: false
    depends_on: ["wave_4"]
    notes: >
      3.8 (Painel cliente): fluxo de convite por email, /cliente rota, RLS por client_id.
      AC crítico 3.8.2: RLS garante isolamento — acesso a outro client_id → 403 (testado explicitamente).
    status: "pending"

pre_production_gate:
  description: >
    Antes de conectar número de cliente real ao worker em produção, exigir mínimo 7 dias
    de uptime contínuo monitorado sem restart manual, sem queda de sessão e sem alerta
    de memória > 70%.
  monitor: "UptimeRobot Monitor 2 — whatsapp-worker GET /health"
  threshold:
    uptime_days: 7
    no_manual_restart: true
    no_session_drop: true
    memory_alert_threshold: "70%"
  blocks: "conexão de número de cliente real em produção"
  does_not_block: "desenvolvimento das stories restantes do Epic 3 (waves 2–5)"
  verification: >
    Operador confirma no Change Log do epic com print do UptimeRobot (7 dias sem incidente)
    antes de onboarding de primeiro cliente no worker.

security_constraints:
  - "Sessão Baileys em Supabase Storage — nunca em volume Railway (durável em migrações de serviço)"
  - "SUPABASE_SERVICE_ROLE_KEY no Railway via env vars — nunca em código"
  - "Número WA de teste dedicado para dev/staging — nunca número real de cliente"
  - "Dashboard público (3.7): JWT de escopo restrito via Supabase — service key nunca exposta ao browser"
  - "client_id RLS enforced — painel cliente (3.8) nunca acessa outro workspace/client"
  - "cb_paused_at: circuit breaker protege o número WA de banimento por spam de reconexão"

current_wave: 5
