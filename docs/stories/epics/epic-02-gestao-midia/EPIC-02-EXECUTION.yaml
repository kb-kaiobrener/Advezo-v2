epic_id: "EPIC-02"
epic_name: "Gestão de Mídia (Meta Ads + Google Ads)"
epic_path: "docs/stories/epics/epic-02-gestao-midia"
created_by: "@pm (Morgan)"
created_at: "2026-06-26"
status: "active"  # Wave 1 liberada — PC-01 e PC-02 resolvidos em 2026-06-26

goal: >
  Habilitar o gestor a operar todas as contas de Meta Ads e Google Ads dos seus clientes
  diretamente no Advezo — conectando via OAuth, sincronizando campanhas e métricas de forma
  agendada e sob demanda, executando ações inline e visualizando saúde e histórico de 4 semanas
  sem abrir o gerenciador nativo.

product_docs:
  prd: "docs/prd.md"
  architecture: "docs/architecture.md"  # Seção 10 — Estratégia de Sandbox e Testes de Integração (PC-01)
  sandbox_strategy: "docs/architecture.md#10-estratégia-de-sandbox-e-testes-de-integração"
  ux_spec: "docs/ux-design-spec.md"

# ─────────────────────────────────────────────
# MODO DE EXECUÇÃO
# ─────────────────────────────────────────────
#
# Regra de rigor herdada do Epic 1 (confirmada pelo usuário 2026-06-26):
#   FULL QA Gate + interactive mode: qualquer story com OAuth real, token criptografado,
#     chamada a API externa (Meta/Google), ou dado saindo do ambiente local/mock.
#   YOLO + simplified gate: stories de UI que apenas lêem de tabelas DB já sincronizadas,
#     sem nova chamada externa, sem nova RLS.
#
execution_mode: "interactive"  # default — waves sobrescrevem
wave_execution_modes:
  wave_1: "interactive"   # OAuth + AES-256-GCM — risco máximo
  wave_2: "interactive"   # Sync cron + APIs externas — risco máximo
  wave_3: "yolo"          # UI/Analytics lendo campaign_metrics — baixo risco
  wave_4: "interactive"   # Ações inline (mutations em API externa) + alertas
qa_gate_level:
  wave_1: "full"
  wave_2: "full"
  wave_3: "simplified"    # build + typecheck + testes passando
  wave_4: "full"
auto_release_waves: [3]   # somente Wave 3 auto-libera; demais requerem confirmação

state_file: ".aiox/epic-02-state.yaml"

# ─────────────────────────────────────────────
# PRÉ-CONDIÇÕES (bloqueiam Wave 1)
# ─────────────────────────────────────────────
pre_conditions:
  - id: "PC-01"
    description: "@architect define estratégia de sandbox por plataforma (Meta Test Ad Account, Google test customer)"
    owner: "@architect"
    required_before: "wave_1"
    reference: "docs/architecture.md — Seção 10 (Estratégia de Sandbox e Testes de Integração)"
    status: "resolved"  # 2026-06-26 — @architect (Aria): Seção 10 documenta Meta + Google sandbox, env vars, anti-prod CI, nota TOKEN_ENCRYPTION_KEY por ambiente

  - id: "PC-02"
    description: "Utilitário de criptografia AES-256-GCM criado/validado em packages/utils antes de armazenar tokens"
    owner: "@data-engineer + @dev"
    required_before: "wave_1"
    reference: "docs/architecture.md — NFR-1 / Seção 16 (Security) / packages/utils/src/crypto.ts"
    status: "resolved"  # 2026-06-26 — @architect (Aria): crypto.ts (AES-256-GCM) + 5 testes passando; TOKEN_ENCRYPTION_KEY no .env.example

  - id: "PC-03"
    description: "Google Ads Developer Token validado para produção (processo de aprovação Google)"
    owner: "Usuário (ação manual fora do sistema)"
    required_before: "wave_2"
    note: "Story 2.2 pode prosseguir em sandbox; Story 2.4 requer token de produção aprovado. Processo documentado em docs/architecture.md Seção 10.2."

# ─────────────────────────────────────────────
# STORIES
# ─────────────────────────────────────────────
