# ─────────────────────────────────────────────
# WAVES — Ordem de execução
# ─────────────────────────────────────────────
waves:
  - wave: 1
    name: "OAuth + Criptografia"
    description: >
      Sequencial: 2.1 cria a tabela ad_accounts e o utilitário AES-256-GCM.
      2.2 reutiliza essa estrutura para Google. PC-01 e PC-02 devem estar
      resolvidos antes de iniciar.
    mode: "sequential"
    checkpoint_required: true
    stories: ["2.1", "2.2"]
    gate:
      validator: "@architect"
      level: "full"
      criteria:
        - "Fluxo OAuth Meta completo: redirect → callback → token armazenado criptografado"
        - "Token AES-256-GCM: nunca em texto puro na tabela ad_accounts"
        - "RLS em ad_accounts: isolamento por workspace_id via auth_workspace_id()"
        - "Fluxo OAuth Google completo com refresh token — ambos criptografados"
        - "Múltiplas Business Managers / MCC suportadas por workspace"
        - "Token expirado gera alerta visível na UI (NFR-4)"
        - "Testes de integração validando fluxo OAuth com sandbox Meta + Google"

  - wave: 2
    name: "Data Sync + Cron"
    description: >
      Sequencial: 2.3 cria a infraestrutura de cron no Railway e a tabela
      campaign_metrics. 2.4 estende o cron existente para Google Ads.
      Requer PC-03 resolvido antes de 2.4 em produção.
    mode: "sequential"
    checkpoint_required: true
    stories: ["2.3", "2.4"]
    gate:
      validator: "@architect"
      level: "full"
      criteria:
        - "Cron Railway executando sync diário Meta — last_synced_at atualizado"
        - "Deduplicação de conversões Meta preservada (lógica da v1)"
        - "campaign_metrics populado com dados reais após sync"
        - "sync_errors registrado e visível na UI quando sync falha (NFR-4)"
        - "Botão Sincronizar agora funcional por conta"
        - "Cron inclui Google Ads; refresh token renovado automaticamente"
        - "Falhas de renovação de refresh token geram alerta (NFR-4)"
        - "Testes de integração com sandbox Meta Test Ad Account e Google test customer"

  - wave: 3
    name: "UI + Analytics"
    description: >
      UI consumindo campaign_metrics já validado nas Waves 1-2.
      2.5 e 2.6 podem rodar em paralelo (arquivos não conflitantes).
      2.8 depende da UI de listagem (2.5) para contexto de navegação.
    mode: "parallel"  # 2.5 e 2.6 paralelo; 2.8 após 2.5
    checkpoint_required: false  # auto-release após gate
    stories: ["2.5", "2.6", "2.8"]
    execution_order: "2.5 || 2.6, então 2.8 após 2.5"
    gate:
      validator: "@architect"
      level: "simplified"
      criteria:
        - "Listagem de campanhas com colunas corretas (plataforma, nome, status, orçamento, gasto)"
        - "Filtros de status e busca funcionando em campaign_metrics local"
        - "Dashboard 1.6 substituído por dados reais com lógica de cor real"
        - "Análise 4 semanas renderizada corretamente (S-4, S-3, S-2, S-1)"
        - "build + typecheck + testes passando"

  - wave: 4
    name: "Ações Inline + Alertas"
    description: >
      Sequencial: 2.7 (ações inline — HIGH RISK, chamadas reais de mutation à API)
      precede 2.9 (alertas — cria action_log que pode ser referenciado em alertas).
    mode: "sequential"
    checkpoint_required: true
    stories: ["2.7", "2.9"]
    gate:
      validator: "@architect"
      level: "full"
      criteria:
        - "Pausar/ativar campanha chama API Meta/Google real e confirma mudança de status"
        - "Ajuste de orçamento inline persiste na plataforma (não apenas localmente)"
        - "action_log registra quem, o quê, quando, resultado para toda ação"
        - "Erros de API exibidos inline sem reload (NFR-4)"
        - "Alerta de saldo detectado corretamente com projeção de N dias"
        - "Tabela alerts populada pelo cron com status correto"
        - "Badge de alerta visível na conta afetada no dashboard"
        - "Testes com mocks de API para pausar/ativar (não chamar API real em CI)"

# ─────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────
constraints:
  global_blockers:
    - description: "PC-01 e PC-02 devem estar resolvidos antes da Wave 1 iniciar"
      affects: "wave_1"
    - description: "PC-03 (Developer Token Google produção) deve estar validado antes de 2.4 em produção"
      affects: "story_2.4"

  security_non_negotiable:
    - "Tokens OAuth NUNCA em texto puro — AES-256-GCM obrigatório antes de persistir (NFR-1)"
    - "NEXT_PUBLIC_* nunca deve conter secrets de API externa"
    - "Falhas de sync NUNCA silenciosas — registrar em sync_errors e exibir na UI (NFR-4)"
    - "action_log obrigatório para toda mutação inline em campanha"
    - "Sandbox obrigatório em desenvolvimento/staging (Meta Test Ad Account, Google test customer)"

  constitution_gates:
    - article: "I (CLI First)"
      check: "OAuth flows via redirect/callback padrão da plataforma — não bibliotecas proprietárias"
    - article: "IV (No Invention)"
      check: "Todos os ACs rastreáveis ao PRD — nenhuma feature de sync ou análise inventada"
    - article: "V (Quality First)"
      check: "Testes de integração com sandbox obrigatórios antes de QA gate das Waves 1 e 2"

# ─────────────────────────────────────────────
# POST-EPIC
# ─────────────────────────────────────────────
post_epic:
  next_epic: "EPIC-03"
  next_epic_name: "Comunicação com Cliente (WhatsApp)"
  trigger: "QA gate Wave 4 PASS"
  note: >
    Story 3.1 (Migração WhatsApp Worker para Baileys) é pré-requisito de todas as
    outras stories do Epic 3 e pode ser iniciada ANTES do Epic 2 terminar — não há
    dependência técnica entre 3.1 e as waves do Epic 2. @pm pode criar EPIC-03
    e liberar Story 3.1 imediatamente após Epic 2 Wave 1 PASS se quiser paralelismo.
  handoff_notes: >
    Após Epic 2 completo: OAuth conectado, sync de métricas ativo, ações inline
    disponíveis e alertas de saldo configurados. Epic 3 pode consumir os alertas
    gerados pela Story 2.9 via tabela alerts (campo status pending → Story 3.6).
