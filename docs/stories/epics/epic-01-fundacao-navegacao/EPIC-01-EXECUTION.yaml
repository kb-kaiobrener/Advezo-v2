epic_id: "EPIC-01"
epic_name: "Fundação e Navegação"
epic_path: "docs/stories/epics/epic-01-fundacao-navegacao"
created_by: "@pm (Morgan)"
created_at: "2026-06-25"
status: "done"

goal: >
  Estabelecer infraestrutura técnica completa (Next.js/Vercel + Supabase + Railway skeleton)
  e entregar a primeira fatia de valor visível: autenticação multi-tenant, design system,
  navegação lateral com 7 itens, seletor de cliente/conta e dashboard com indicadores de saúde.

product_docs:
  prd: "docs/prd.md"
  architecture: "docs/architecture.md"
  ux_spec: "docs/ux-design-spec.md"

execution_mode: "yolo"  # default atualizado 2026-06-25 — velocidade máxima para Epic 1 restante
wave_execution_modes:
  wave_1: "yolo"         # scaffolding/infra — baixo risco, sem lógica de negócio
  wave_2: "interactive"  # auth + design system — revisão manual (já concluída)
  wave_3: "yolo"         # UI/sidebar — sem RLS nova, sem dado sensível; auto-release
  wave_4: "yolo"         # dashboard — scaffolding puro; auto-release
qa_gate_level:
  wave_3: "simplified"   # build + typecheck + testes passando; sem relatório linha por linha
  wave_4: "simplified"
auto_release_waves: [3, 4]  # gate PASS → próxima wave inicia automaticamente
state_file: ".aiox/epic-01-state.yaml"

