security_notes:
  - >-
    resendReport e sendNow filtram por workspace_id (proteção IDOR cross-workspace).
    Confirmado por teste.
  - >-
    Cron protegido por Bearer CRON_SECRET; 401 sem header ou secret inválido.
    Teste PASS.
  - >-
    CRON_SECRET e WHATSAPP_WORKER_URL server-only (nunca NEXT_PUBLIC_).

top_issues:
  - id: 'GRANT-001'
    severity: medium
    finding: >-
      Cron send-reports chama generateReport, que lê ad_accounts e campaign_metrics.
      Ambas retornam 403 para service_role (permission denied) — sem GRANT explícito
      nas migrations 000004/000006. Em produção, schedule real dispara, generateReport
      lança, try/catch marca log como failed (degradação graciosa), mas nenhum
      relatório é enviado. Lacuna herdada (afeta também generateReport da 3.4);
      precedente de fix: migration 000011 (whatsapp_accounts_grants).
    suggested_action: >-
      Migration de grants antes do release: GRANT SELECT ON ad_accounts,
      ad_campaigns, campaign_metrics TO service_role (e alerts, ver Story 3.6).
      Não é defeito do código da 3.5 — tabelas próprias (report_logs,
      report_schedules, whatsapp_accounts) já têm grant.
  - id: 'REL-003'
    severity: low
    finding: >-
      computePeriod daily usa period_start = period_end = hoje (janela de 1 dia).
      Confirmar com produto se relatório diário deve cobrir 24h anteriores vs. dia
      corrente parcial.
    suggested_action: 'Sem impacto técnico; alinhar com produto se necessário.'

required_before_production:
  - >-
    Migration de grants para service_role em ad_accounts, ad_campaigns,
    campaign_metrics (compartilhada com a correção da Story 3.6). Sem ela o cron
    registra envios como failed em vez de enviar.

