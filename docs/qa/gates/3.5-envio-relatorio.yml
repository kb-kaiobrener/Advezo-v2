story: '3.5'
slug: envio-relatorio
title: Envio de Relatório via WhatsApp
gate: CONCERNS
status_reason: >-
  9/9 ACs implementados e cobertos por testes (27/27 PASS). Código autoral correto:
  dedup atômico via upsert ignoreDuplicates, fix de JID de grupo no worker verificado,
  sendNow resolve colisão de período reaproveitando o log. Teste manual (REST com
  service_role real) expôs GRANT-001: ad_accounts/campaign_metrics sem GRANT para
  service_role fazem generateReport falhar em produção (degradação graciosa, log
  failed). Lacuna herdada/compartilhada, não defeito da 3.5; requer migration de
  grants (precedente 000011) antes do release funcional.
