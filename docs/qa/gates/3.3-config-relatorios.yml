security_notes:
  - >-
    saveReportSchedule valida destination_id ANTES de qualquer acesso ao banco e
    ANTES de checar auth — confirmado por teste (mockCreateServiceClient não é
    chamado em input inválido).
  - >-
    toggleReportSchedule filtra por workspace_id além de id — evita IDOR
    cross-workspace. Confirmado por teste.
  - >-
    RLS habilitado com workspace_isolation policy; grants para service_role e
    authenticated.

top_issues:
  - id: 'REL-001'
    severity: low
    finding: >-
      send_day não tem validação de faixa server-side nem CHECK constraint no DB
      (0-6 weekly/biweekly, 1-28 monthly). UI constrange, mas request forjado
      poderia persistir valor fora de faixa.
    suggested_action: >-
      Fora do escopo desta story (validação server-side foi escopada só para
      destination_id — Change Log entry 5). O cron da Story 3.5 deve tratar
      send_day defensivamente ou adicionar CHECK em migration futura.
  - id: 'REL-002'
    severity: low
    finding: >-
      send_time não validado server-side (formato HH:MM). Postgres time rejeita
      valor malformado no DB, retornando erro genérico "Erro ao salvar configuração".
    suggested_action: >-
      Aceitável — DB é o backstop. Nenhuma ação requerida.

carry_forward_to_story_3_5:
  - >-
    Cron consumidor deve tratar send_day defensivamente (sem CHECK constraint no DB).

