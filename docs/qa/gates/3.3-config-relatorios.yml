acceptance_criteria:
  - id: 'AC-3.3.1'
    status: met
    note: >-
      Formulário condicional em ReportScheduleForm — send_day exibido só para
      weekly/biweekly (dropdown Seg-Dom) e monthly (número 1-28), oculto para daily;
      hora padrão 09:00.
  - id: 'AC-3.3.2'
    status: met
    note: >-
      Individual /^\d{10,15}$/ após strip de +/espaços; grupo /^\d+@g\.us$/.
      Validado client-side e server-side (report-schedules.ts linhas 50-59).
  - id: 'AC-3.3.3'
    status: met
    note: >-
      Upsert com onConflict 'workspace_id,client_id'; migration 000013 com
      UNIQUE (workspace_id, client_id).
  - id: 'AC-3.3.4'
    status: met
    note: >-
      toggleReportSchedule atualiza apenas is_active; sem delete. Filtro por
      id + workspace_id (proteção IDOR).
  - id: 'AC-3.3.5'
    status: met
    note: >-
      previewReport chama generateReport(workspaceId, clientId, {from: hoje-30d, to: hoje});
      exibido em <pre> scrollável no ReportPreviewModal; nenhum envio real.
  - id: 'AC-3.3.6'
    status: met
    note: >-
      Query com maybeSingle(); estado "Não configurado" quando sem schedule;
      carrega valores quando existe; "Salvar" é o único ponto de persistência.

