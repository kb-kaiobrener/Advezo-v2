item: 'TD-005'
slug: hotfix-workspace-claim-getclaims
title: 'Hotfix TD-005 — workspace_id via getClaims + grants'
gate: PASS
status_reason: >-
  Iteração 2 aprovada. getClaims (5 pontos) corrigiu a fonte do claim; migration
  000020 concedeu INSERT/UPDATE/DELETE (+SELECT lead_forms/leads) ao role correto
  (authenticated), fechando BLOCK-004 e BLOCK-005. Verificado independentemente
  com sessão real de gestor (role authenticated de verdade, não service_role):
  INSERT ad_accounts do próprio workspace → 201; RLS barra INSERT cross-workspace
  → 403 (WITH CHECK herdado do USING); /api/lead-forms ponta a ponta → 201 com
  workspace_id = claim do JWT. Grant só para authenticated (sem anon). TD-006
  (clients/workspace_members) fora de escopo, permanece aberto.
reviewer: 'Quinn'
updated: '2026-07-08T02:55:00Z'

