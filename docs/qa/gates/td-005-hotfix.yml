  gate: PASS
  date: '2026-07-08T02:55:00Z'
  migration: '20260101000020_authenticated_write_grants.sql (000019 intocada)'
  verificacao_sessao_real:
    ad_accounts_insert_proprio: '201 ✅'
    ad_accounts_insert_alheio: '403 (RLS WITH CHECK) ✅'
    ad_accounts_update_delete_proprio: '200 ✅'
