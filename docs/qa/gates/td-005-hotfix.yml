    lead_forms_sem_sessao: '307 → /login (bloqueado) ✅'
    grant_scope: 'apenas authenticated (2 ocorrências de anon são comentário) ✅'
  suite: '335 passed (baseline; falha única pré-existente workspace-actions)'
  cleanup: 'usuário/workspace/clients/lead_forms/ad_accounts de teste removidos (todos */0)'
