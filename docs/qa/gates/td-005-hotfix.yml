    - 'OAuth Meta/Google token real: consent no browser (staging manual) — a operação de escrita (INSERT ad_accounts via authenticated) está provada.'

verified_correct:
  - id: 'getClaims-5-pontos'
    note: >-
      Fonte do claim trocada para getClaims() (JWT/JWKS) nos 5 arquivos. Verificado
      com sessão real de gestor: JWT workspace_id = membership; /onboarding →
      /dashboard (proxy hasWorkspace agora lê o claim); guards de workspace passam
      (lead-forms não retorna mais 403 "workspace não encontrado", avança à camada DB).
  - id: 'varredura-consumidores'
    note: >-
      Varredura independente: nenhum consumidor de claim customizado (workspace_id/
      client_id) ficou lendo getUser().user_metadata. Sidebar (full_name/name) usa
      metadata padrão (não do hook) — correto. definir-senha usa getSession() só
      para checar sessão. 5 pontos são o conjunto completo.
  - id: 'migration-000019-rls'
    note: >-
      As 4 tabelas (lead_forms/leads/action_log/sync_errors) têm RLS +
      workspace_isolation; grant só para service_role (sem authenticated/anon) —
      não superexpõe. Porém é o role ERRADO para os handlers de sessão (ver blocker).

blocking_issues:
  - id: 'BLOCK-004'
    severity: high
    category: security
    finding: >-
      OAuth Meta/Google callbacks fazem upsert em ad_accounts via client de sessão
      (createSupabaseServerClient = role authenticated). authenticated tem SELECT em
      ad_accounts (000018) mas NÃO tem INSERT/UPDATE (nunca concedido). Teste com
      sessão real: authenticated INSERT ad_accounts → 403 permission denied. Com o
      guard corrigido, o upsert agora é alcançado e falha → catch → ?error=oauth_failed.
      ad_accounts NÃO recebe linha pelo caminho real. A prova anterior usou
      service_role (que tem grant), não o role do handler.
    required_action: >-
      GRANT INSERT, UPDATE, DELETE ON ad_accounts (e ad_campaigns, campaign_metrics)
      TO authenticated — OU refatorar os callbacks para usar service client. Migração
      + re-teste com sessão real produzindo linha em ad_accounts.
  - id: 'BLOCK-005'
    severity: high
    category: security
    finding: >-
      lead-forms POST insere em lead_forms via client de sessão (authenticated).
      000019 concedeu lead_forms a service_role — role errado. Teste com sessão real:
      POST /api/lead-forms com gestor → 500 "permission denied for table lead_forms".
      O objetivo declarado do GRANT-002 (destravar lead-forms) NÃO foi atingido.
    required_action: >-
      GRANT ... ON lead_forms, leads TO authenticated (OU refatorar handler para
      service client). Alinhar a decisão role/handler com o padrão do projeto.

related_finding:
  - id: 'TD-006 (novo)'
    severity: medium
    finding: >-
      Gap sistêmico de grant para authenticated em tabelas do Epic 1/2 consumidas
      por session client: workspace_members, clients, leads, lead_forms (403).
      workspace.ts (onboarding) contorna usando service client; clients.ts usa
      session client → createClient/CRUD de clientes provavelmente quebrado via app
      (getAuthenticatedWorkspace lê workspace_members = 403 → redirect /onboarding).
      Registrar TD-006 e mapear todos os handlers session-client vs service-client.

