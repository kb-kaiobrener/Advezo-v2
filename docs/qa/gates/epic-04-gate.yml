story_4_1:
  policies_ativas: >-
    tracking_links/tracked_conversations: workspace_isolation FOR ALL
    (workspace_id = auth_workspace_id()); tracked_clicks: FOR ALL via subquery
    de tracking_links — exatamente como revisado.
  grants_matriz: >-
    tracking_links: authenticated+service_role CRUD; tracked_clicks e
    tracked_conversations: authenticated SELECT-only, service_role CRUD;
    ZERO grants para anon.
  spot_check_sessao_real: 'INSERT links 201 / clicks 403 / conversations 403 ✅'

story_4_4:
  revisao: >-
    processIncomingMessage: só @s.whatsapp.net; skip sem GLOBAL_HMAC_SECRET
    (coerente com 4.3); client via whatsapp_connections; dedup pela UNIQUE;
    LIFO global documentado; untracked sempre registrada; aviso ao titular com
    falha não-destrutiva; nunca propaga exceção. Integração index.ts: void em
    messages.upsert, só !fromMe — não bloqueia atendimento (AC 4.4.5).
  corrida_mesmo_numero: 'PROTEGIDA — UNIQUE(workspace,client,hash); 2º INSERT falha e é logado.'
  FU-001:
    severity: medium
    tipo: acompanhamento (não bloqueia)
    finding: >-
      Números DIFERENTES quase simultâneos disputando o mesmo clique não-casado:
      ambos leem o mesmo clique (SELECT LIFO sem lock), ambos inserem tracked com
      o MESMO click_id, e o UPDATE phone_matched=true é incondicional (idempotente,
      sem erro). Observável: 2 conversas → 1 clique. O código documenta o LIFO mas
      NÃO documenta essa janela — comportamento não bate integralmente com o
      documentado.
    recomendacao: >-
      Claim atômico (padrão 3.6): UPDATE tracked_clicks SET phone_matched=true
      WHERE id=X AND phone_matched=false RETURNING id ANTES do INSERT; perdedor
      re-consulta o próximo clique ou registra untracked. Enquanto não aplicado,
      documentar a janela no cabeçalho do tracking.ts.

