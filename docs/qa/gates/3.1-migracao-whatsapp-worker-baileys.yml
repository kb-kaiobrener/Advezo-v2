# ── Issues (todos não-bloqueantes) ───────────────────────────────
top_issues:
  - id: 'MNT-001'
    severity: low
    finding: "status CHECK da migration permite 'connecting', mas o código nunca seta esse valor (apenas connected/cb_paused/disconnected)."
    suggested_action: 'Avaliar na Story 3.2 se a UI usa connecting; caso não, considerar setar connecting durante o handshake ou remover do CHECK.'
  - id: 'PERF-001'
    severity: low
    finding: 'createSupabaseServiceClient() é instanciado por chamada em markDisconnected/recordFailure/recordSuccess em vez de reutilizado.'
    suggested_action: 'Memoizar o client a nível de módulo se o volume de updates crescer. Sem impacto no escopo atual.'
  - id: 'REL-001'
    severity: low
    finding: 'Contagem do circuit breaker vive só em memória; restart do worker zera a janela (cb_paused_at persistido mantém o bloqueio, mas a contagem reinicia).'
    suggested_action: 'Comportamento documentado e aceitável (cb_paused_at sobrevive). Monitorar nas 24h de staging se flapping pós-restart ocorre.'

