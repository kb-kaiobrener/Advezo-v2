top_issues:
  - id: 'REL-001'
    severity: low
    finding: 'Em handleDashboardPasswordGate, falha de rede no fetch REST de password_hash resulta em config indefinida → next() (fail-open no lookup). Não há bypass de dados protegidos (page.tsx faz notFound() se config ausente e também depende do service fetch), mas é inconsistente com o fail-closed aplicado à ausência de credenciais.'
    suggested_action: 'Opcional: tratar !res.ok como fail-closed (redirect /senha) para alinhar comportamento. Não bloqueante — nenhum dado protegido é servido sem cookie válido.'

