acceptance_criteria:
  - id: 'AC 3.7.1'
    status: PASS
    note: 'DashboardConfigForm: multi-checkbox (8 métricas de AVAILABLE_METRICS), upload logo PNG/JPEG, senha opcional, botão Gerar/Atualizar link. saveDashboardConfig preserva token existente.'
  - id: 'AC 3.7.2'
    status: PASS
    note: "Token = encode(extensions.gen_random_bytes(20),'hex') (hex-40) via DEFAULT da migration; re-save busca config existente e reencaminha o token — nunca gera novo. Upsert onConflict workspace_id,client_id."
  - id: 'AC 3.7.3'
    status: PASS
    note: 'page.tsx é Server Component puro usando createSupabaseServiceClient() (server-side). Valida is_active=true, notFound() se ausente. Service key nunca exposta (não NEXT_PUBLIC_). NFR-2 atendido.'
  - id: 'AC 3.7.4'
    status: PASS
    note: 'Dashboard exibe <Image> do logo, nome do cliente, período (mês atual PT-BR), métricas formatadas PT-BR via formatMetricValue, e última atualização (synced_at) formatada pt-BR.'
  - id: 'AC 3.7.5'
    status: PASS
    note: 'Guard no proxy.ts: sem senha → next() (ISR); com senha sem cookie válido → redirect /senha. Route Handler valida senha (HMAC+timingSafeEqual) e seta cookie httpOnly dash_auth_[token], maxAge 24h. Cookie HMAC verificado por WebCrypto no Edge nas próximas visitas.'
  - id: 'AC 3.7.6'
    status: PASS
    note: 'Botão Copiar link (navigator.clipboard.writeText) e Desativar link (deactivateDashboard → is_active=false → page.tsx notFound/404). Reativação via saveDashboardConfig mantém o mesmo token.'
  - id: 'AC 3.7.7'
    status: PASS
    note: 'uploadDashboardLogo valida size ≤ 2MB e mime (image/png|image/jpeg) ANTES do upload ao Storage. Bucket dashboard-logos público, chave {workspaceId}/{clientId}/logo.{ext}, logo_url persistida.'
  - id: 'AC 3.7.8'
    status: PENDING
    note: 'Requisitos técnicos implementados (revalidate=300, <Image>, Server Component sem fetch client-side/JS, Tailwind inline, agregação server-side). Medição Lighthouse ≥ 90 / LCP < 2s exige deploy Vercel — fora de escopo desta review.'

