gate: FAIL
status_reason: >-
  Teste manual (REST com service_role real) expôs 2 bloqueadores que tornam o cron
  send-alerts não-funcional em produção, ambos mascarados pelos mocks unitários.
  BLOCK-001: ad_accounts!inner(name)/adAccount.name usa coluna inexistente (é
  account_name) → query 400 → cron 500 → nenhum alerta enviado. BLOCK-002: alerts
  sem GRANT para service_role → 403 em SELECT+UPDATE → claim atômico e rollback não
  executam. Desenho de dedup está correto e bem testado, mas não roda. Retorna para @dev.
