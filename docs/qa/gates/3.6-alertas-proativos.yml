blocking_issues:
  - id: 'BLOCK-001'
    severity: high
    category: code
    finding: >-
      send-alerts/route.ts L29 usa ad_accounts!inner(name) e L88 lê adAccount.name.
      Coluna não existe — em ad_accounts (000004) o campo é account_name. REST retorna
      400 "column ad_accounts_1.name does not exist". Primeira query do cron falha,
      alertsError dispara, rota retorna 500, nenhum alerta é enviado. Teste passou
      porque o mock devolvia { name: '...' }.
    required_action: >-
      Trocar ad_accounts!inner(name) → ad_accounts!inner(account_name) e adAccount.name
      → adAccount.account_name na rota; ajustar mock do teste para { account_name }.
  - id: 'BLOCK-002'
    severity: high
    category: security
    finding: >-
      Cron lê e faz claim (UPDATE) em alerts via service_role. alerts (000008) não
      tem GRANT para service_role — REST 403 (permission denied). Sem SELECT+UPDATE,
      leitura inicial, claim (AC 3.6.2) e rollback (AC 3.6.3) não funcionam. ad_accounts
      (embed) tem o mesmo 403.
    required_action: >-
      Migration de grants (precedente 000011): GRANT SELECT, INSERT, UPDATE, DELETE
      ON public.alerts TO service_role; GRANT SELECT ON public.ad_accounts TO
      service_role (+ ad_campaigns, campaign_metrics para desbloquear a 3.5).

positives:
  - 'Estrutura de dedup (claim + rollback) sólida; edge case de crash pós-claim documentado e aceito.'
  - 'Migration 000016 aplicada corretamente (Local=Remote); colunas verificadas no REST.'
  - 'saveAlertDestination + UI corretos e testados (não afetados pelos bloqueadores).'

return_to_dev:
  - 'Corrigir BLOCK-001 (name → account_name na rota + mock).'
  - 'Corrigir BLOCK-002 (migration de grants service_role em alerts/ad_accounts).'
  - 'Re-teste manual do cron com curl autenticado obrigatório antes de reenviar ao gate.'

